<!-- UI Logic Scripts -->
<script>
        // Form Toggle Logic
        const loginTab = document.getElementById('loginTab');
        const signupTab = document.getElementById('signupTab');
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');

        loginTab.addEventListener('click', () => {
            loginTab.classList.add('bg-primary', 'text-white', 'shadow-lg');
            loginTab.classList.remove('text-on-surface-variant', 'hover:bg-surface-container-high/40');
            signupTab.classList.remove('bg-primary', 'text-white', 'shadow-lg');
            signupTab.classList.add('text-on-surface-variant', 'hover:bg-surface-container-high/40');
            
            loginForm.classList.remove('hidden');
            signupForm.classList.add('hidden');
        });

        signupTab.addEventListener('click', () => {
            signupTab.classList.add('bg-primary', 'text-white', 'shadow-lg');
            signupTab.classList.remove('text-on-surface-variant', 'hover:bg-surface-container-high/40');
            loginTab.classList.remove('bg-primary', 'text-white', 'shadow-lg');
            loginTab.classList.add('text-on-surface-variant', 'hover:bg-surface-container-high/40');
            
            signupForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
        });

        // 3D Tilt Effect
        const card = document.querySelector('.glass-panel');
        const container = document.querySelector('.perspective-1000');

        container.addEventListener('mousemove', (e) => {
            const rect = container.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            
            const rotateX = ((y - centerY) / centerY) * -5; // Limit to 5 degrees
            const rotateY = ((x - centerX) / centerX) * 5;
            
            card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        container.addEventListener('mouseleave', () => {
            card.style.transform = `rotateX(0deg) rotateY(0deg)`;
        });

        // Parallax Mouse Effect
        const bg = document.querySelector('.parallax-bg');
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            bg.style.transform = `scale(1.1) translate(${moveX}px, ${moveY}px)`;
        });
    </script>
